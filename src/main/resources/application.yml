spring:
  application:
    name: nevis-search-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:172.18.0.2}:5432/nevis_search
    username: nevis
    password: nevis

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

  ai:
    vectorstore:
      pgvector:
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 384
        initialize-schema: true

    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o-mini

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

search:
  result-limit: 20
