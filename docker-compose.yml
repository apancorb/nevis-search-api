services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: nevis_search
      POSTGRES_USER: nevis
      POSTGRES_PASSWORD: nevis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nevis -d nevis_search"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nevis_search
      SPRING_DATASOURCE_USERNAME: nevis
      SPRING_DATASOURCE_PASSWORD: nevis
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

volumes:
  pgdata:
