services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${DB_NAME:-nevis_search}
      POSTGRES_USER: ${DB_USER:-nevis}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nevis}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nevis} -d ${DB_NAME:-nevis_search}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-nevis_search}
      DB_USER: ${DB_USER:-nevis}
      DB_PASSWORD: ${DB_PASSWORD:-nevis}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

volumes:
  pgdata:
